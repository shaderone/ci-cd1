name: Assignment-3

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-task3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload to github Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: make site live
        uses: actions/deploy-pages@v4
